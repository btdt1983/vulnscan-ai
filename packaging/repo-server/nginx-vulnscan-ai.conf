# nginx server block for the vulnscan-ai signed dnf repo.
#
# A dnf repo is just static files (RPMs + repodata/ + the GPG public key), so
# this is plain static hosting over HTTPS. Drop this in
# /etc/nginx/conf.d/vulnscan-ai.conf, adjust server_name and cert paths, then:
#   nginx -t && systemctl reload nginx
#
# Publish into /srv/repo/vulnscan-ai (see SETUP.md); the release runner rsyncs
# dist/repo/ there.

# Redirect HTTP -> HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name repo.example.com;          # <-- change me
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name repo.example.com;          # <-- change me

    # Use your CA-issued cert. The system crypto policy (incl. FIPS) governs
    # the TLS suites; do not hand-pick weak ciphers here.
    ssl_certificate     /etc/pki/tls/certs/repo.example.com.crt;   # <-- change me
    ssl_certificate_key /etc/pki/tls/private/repo.example.com.key; # <-- change me
    ssl_protocols TLSv1.2 TLSv1.3;

    # The repo lives under /vulnscan-ai so multiple repos can share the host.
    root /srv/repo;

    location /vulnscan-ai/ {
        autoindex on;                      # allow simple browsing (optional)
        # Repo metadata changes often; let clients see it promptly.
        location ~* /repodata/ {
            add_header Cache-Control "no-cache";
        }
        # RPMs are immutable once published (version-release is unique).
        location ~* \.rpm$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # Don't serve anything else.
    location = / { return 404; }
}
