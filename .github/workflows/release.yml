name: release

# Build, sign, and publish to the signed dnf repo on a version tag.
# Runs on a SELF-HOSTED runner that lives on (or can reach) the repo host and
# holds the production signing key (passphrase-protected software key today;
# an OpenPGP smartcard / HSM remains the eventual goal — see the PIN step).
on:
  push:
    tags: ['v*']

jobs:
  publish:
    # Label your repo-host runner with these (Settings -> Actions -> Runners).
    runs-on: [self-hosted, linux, vulnscan-ai-repo]
    env:
      REPO_ROOT: /srv/repo
      REPO_BASEURL: https://repo.techhack.nl
      # Build targets. el8 needs the python39 module (default python3 is 3.6);
      # see README before enabling it.
      DISTS: el9
      # noarch package is mirrored into these EL trees with no rebuild.
      EXTRA_DISTS: el10
      # Signing identity = the production key imported on the runner.
      VULNSCANAI_GPG_EMAIL: ${{ vars.SIGNING_EMAIL }}
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Tag matches packaged version
        run: |
          v=$(awk -F'= *' '/^version *=/{gsub(/[[:space:]]/,"",$2);print $2;exit}' setup.cfg)
          [ "${GITHUB_REF_NAME#v}" = "$v" ] || { echo "tag != version $v"; exit 1; }

      - name: Provision the signing passphrase (so signing is non-interactive)
        # Software key: stage the passphrase secret into a 0600 file that
        # make-repo.sh reads via VULNSCANAI_GPG_PASSPHRASE_FILE.
        # Hardware key (future): instead preset the card's user PIN for the
        # signing keygrip — `gpg-preset-passphrase --preset <KEYGRIP> <<< $PIN`.
        run: |
          umask 077
          printf '%s' "${{ secrets.SIGNING_PASSPHRASE }}" > "$RUNNER_TEMP/signing.pass"
          echo "VULNSCANAI_GPG_PASSPHRASE_FILE=$RUNNER_TEMP/signing.pass" >> "$GITHUB_ENV"

      - name: Build, sign, publish, reload
        run: bash packaging/release.sh

      - name: Scrub the staged passphrase
        if: always()
        run: rm -f "$RUNNER_TEMP/signing.pass"

      - name: Smoke test the live repo (all dists)
        run: |
          for d in $DISTS $EXTRA_DISTS; do
            curl -fsS -o /dev/null "$REPO_BASEURL/$d/repodata/repomd.xml"
          done
          curl -fsS -o /dev/null "$REPO_BASEURL/RPM-GPG-KEY-techhack"
